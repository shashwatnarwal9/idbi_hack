# आय·AI on Render, three services: managed Postgres, FastAPI web service,
# React static site. All configuration is env-driven; no secrets live in code.
#
# The two services reference each other by their fixed onrender.com URLs (below).
# If you rename a service, update the matching URL here and re-sync.

databases:
  - name: aayai-db
    plan: free
    databaseName: aayai
    user: aayai

services:
  # FastAPI backend, a persistent uvicorn process (not serverless).
  - type: web
    name: aayai-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn aayai.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: AAYAI_ENV
        value: render
      - key: SERVING_DB_DSN
        fromDatabase:
          name: aayai-db
          property: connectionString
      # the deployed static-site origin, so browser calls from it are allowed
      - key: AAYAI_CORS_ORIGIN
        value: https://aayai-web.onrender.com
      # Airflow runs only on the operator's laptop, so the pipeline endpoint has
      # no credentials in the cloud and returns its labelled unavailable state.

  # React build served as static files, with SPA fallback routing.
  - type: web
    name: aayai-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # build-time API base URL, baked into the bundle at build time
      - key: VITE_API_BASE_URL
        value: https://aayai-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
